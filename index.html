<body>
<div class="container">
    <div class="header">
        <div class="logo">INFECT // PHOTO VAULT</div>
        <h2>Касыч приветульки тебе</h2>
        <div class="controls">
            <button class="clear-all" id="clearAllBtn">🧹 ОЧИСТИТЬ ВСЁ</button>
        </div>
    </div>

 
    <div class="gallery" id="gallery"></div>
    <footer>ВСЕ ФОТО ХРАНЯТСЯ В БРАУЗЕРЕ. НИКАКИХ СЕРВЕРОВ.</footer>
</div>

<script>
    let photos = [];

    function loadPhotos() {
        const stored = localStorage.getItem("infect_photos");
        if (stored) photos = JSON.parse(stored);
        else photos = [];
        renderGallery();
    }

    function savePhotos() {
        localStorage.setItem("infect_photos", JSON.stringify(photos));
    }

    function addPhoto(file) {
        return new Promise((resolve, reject) => {
            if (!file.type.startsWith('image/')) reject("Не изображение");
            if (file.size > 10 * 1024 * 1024) reject("Файл больше 10 МБ");
            const reader = new FileReader();
            reader.onload = (e) => {
                const newPhoto = {
                    id: Date.now() + Math.random() * 10000,
                    name: file.name,
                    data64: e.target.result,
                    date: new Date().toISOString()
                };
                photos.unshift(newPhoto);
                savePhotos();
                renderGallery();
                resolve();
            };
            reader.onerror = () => reject("Ошибка чтения");
            reader.readAsDataURL(file);
        });
    }

    function deletePhoto(id) {
        photos = photos.filter(p => p.id !== id);
        savePhotos();
        renderGallery();
        showToast("Фото удалено");
    }

    function clearAll() {
        if (confirm("Удалить ВСЕ фотографии?")) {
            photos = [];
            savePhotos();
            renderGallery();
            showToast("Галерея очищена");
        }
    }

    function renderGallery() {
        const gallery = document.getElementById("gallery");
        if (!photos.length) {
            gallery.innerHTML = <div class="empty-msg">📭 НЕТ ФОТОГРАФИЙ. ЗАГРУЗИ ПЕРВОЕ.</div>;
            return;
        }
        gallery.innerHTML = photos.map(photo => 
            <div class="photo-card">
                <img class="photo-img" src="${photo.data64}" alt="${escapeHtml(photo.name)}" loading="lazy">
                <div class="photo-info">
                    <span class="photo-name" title="${escapeHtml(photo.name)}">${escapeHtml(photo.name.length > 20 ? photo.name.slice(0, 17)+'...' : photo.name)}</span>
                    <button class="delete-btn" data-id="${photo.id}">✖</button>
                </div>
            </div>
        ).join("");
        document.querySelectorAll(".delete-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseFloat(btn.dataset.id);
                deletePhoto(id);
            });
        });
    }

    function showToast(msg) {
        const toast = document.createElement("div");
        toast.innerText = msg;
        toast.style.position = "fixed";
        toast.style.bottom = "20px";
        toast.style.right = "20px";
        toast.style.background = "#00ffc6";
        toast.style.color = "#0b0d17";
        toast.style.padding = "8px 18px";
        toast.style.borderRadius = "30px";
        toast.style.fontWeight = "bold";
        toast.style.zIndex = "9999";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    const uploadArea = document.getElementById("uploadArea");
    const fileInput = document.getElementById("fileInput");
    uploadArea.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", async (e) => {
        const files = Array.from(e.target.files);
        for (const file of files) {
            try {
                await addPhoto(file);
                showToast(✓ ${file.name} загружено);
            } catch (err) {
                showToast(Ошибка: ${err});
            }
        }
        fileInput.value = "";
    });
    uploadArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = "#00ffc6";
        uploadArea.style.background = "#1a2038";
    });
    uploadArea.addEventListener("dragleave", () => {
        uploadArea.style.borderColor = "#2e3450";
        uploadArea.style.background = "#111522";
    });
    uploadArea.addEventListener("drop", async (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = "#2e3450";
        uploadArea.style.background = "#111522";
        const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
        for (const file of files) {
            try {
                await addPhoto(file);
                showToast(✓ ${file.name} загружено);
            } catch (err) {
                showToast(Ошибка: ${err});
            }
        }
    });
    document.getElementById("clearAllBtn").addEventListener("click", clearAll);
    loadPhotos();
</script>
