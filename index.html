<body>
<div class="container">
    <div class="header">
        <div class="logo">МОЖЕТ ЧТО-ТО ПОЯВИТСЯ</div>
        <button class="new-post-btn" id="newPostBtn">➕ НОВЫЙ ПОСТ</button>
    </div>

    <!-- Форма добавления поста -->
    <div class="post-form" id="postForm">
        <textarea id="postText" rows="4" placeholder="Текст записи..."></textarea>
        <div class="photo-zone" id="photoZone">
            📷 Нажми или перетащи фото сюда (необязательно)
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
        </div>
        <div id="imagePreview"></div>
        <div class="form-buttons">
            <button class="cancel-btn" id="cancelBtn">ОТМЕНА</button>
            <button class="submit-btn" id="submitBtn">ОПУБЛИКОВАТЬ</button>
        </div>
    </div>

    <!-- Лента постов -->
    <div class="feed" id="feed"></div>
    <footer>ВСЕ ПОСТЫ ХРАНЯТСЯ В ТВОЁМ БРАУЗЕРЕ. НИКТО ИХ НЕ УВИДИТ, КРОМЕ ТЕБЯ.</footer>
</div>

<script>
    // ----- Структура поста -----
    let posts = []; // каждый пост: { id, text, imageBase64, date }

    // Загрузка из localStorage
    function loadPosts() {
        const stored = localStorage.getItem("infect_blog_posts");
        if (stored) {
            posts = JSON.parse(stored);
        } else {
            posts = [];
        }
        renderFeed();
    }

    function savePosts() {
        localStorage.setItem("infect_blog_posts", JSON.stringify(posts));
    }

    // Добавление нового поста
    function addPost(text, imageBase64) {
        if (!text.trim() && !imageBase64) {
            alert("Добавь хотя бы текст или фото");
            return false;
        }
        const newPost = {
            id: Date.now(),
            text: text.trim() || "",
            imageBase64: imageBase64 || null,
            date: new Date().toLocaleString()
        };
        posts.unshift(newPost); // новые сверху
        savePosts();
        renderFeed();
        return true;
    }

    // Удаление поста
    function deletePost(id) {
        if (confirm("Удалить этот пост?")) {
            posts = posts.filter(p => p.id !== id);
            savePosts();
            renderFeed();
        }
    }

    function renderFeed() {
        const feed = document.getElementById("feed");
        if (!posts.length) {
            feed.innerHTML = <div class="empty-msg">📭 ПУСТО. НАЖМИ «НОВЫЙ ПОСТ».</div>;
            return;
        }
        feed.innerHTML = posts.map(post => 
            <div class="post">
                <div class="post-header">
                    <span class="post-date">${escapeHtml(post.date)}</span>
                    <button class="delete-post" data-id="${post.id}">✖ УДАЛИТЬ</button>
                </div>
                <div class="post-text">${escapeHtml(post.text).replace(/\n/g, '<br>')}</div>
                ${post.imageBase64 ? <img class="post-image" src="${post.imageBase64}" alt="Фото"> : ''}
            </div>
        ).join("");
        // навесить удаление
        document.querySelectorAll(".delete-post").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.dataset.id);
                deletePost(id);
            });
        });
    }

    // ---------- Логика формы ----------
    const form = document.getElementById("postForm");
    const textarea = document.getElementById("postText");
    const imageInput = document.getElementById("imageInput");
    const photoZone = document.getElementById("photoZone");
    const imagePreviewDiv = document.getElementById("imagePreview");
    let currentImageBase64 = null;

    document.getElementById("newPostBtn").onclick = () => {
        form.style.display = "block";
        textarea.value = "";
        currentImageBase64 = null;
        imagePreviewDiv.innerHTML = "";
        window.scrollTo({ top: 0, behavior: "smooth" });
    };
    document.getElementById("cancelBtn").onclick = () => {
        form.style.display = "none";
        currentImageBase64 = null;
        imagePreviewDiv.innerHTML = "";
    };

    // клик на фото-зону
    photoZone.onclick = () => imageInput.click();
    imageInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
            alert("Только изображения");
            return;
        }
        if (file.size > 10 * 1024 * 1024) {
            alert("Файл больше 10 МБ");
            return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentImageBase64 = ev.target.result;
            imagePreviewDiv.innerHTML = <img src="${currentImageBase64}" class="photo-preview" style="max-width:100%; max-height:150px; border-radius:12px;">;
        };
        reader.readAsDataURL(file);
    };
    // drag & drop на фото-зону
    photoZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        photoZone.style.borderColor = "#00ffc6";
    });
    photoZone.addEventListener("dragleave", () => {
        photoZone.style.borderColor = "#3a405e";
    });
    photoZone.addEventListener("drop", (e) => {
        e.preventDefault();
        photoZone.style.borderColor = "#3a405e";
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            if (file.size > 10 * 1024 * 1024) {
                alert("Файл больше 10 МБ");
                return;
            }
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentImageBase64 = ev.target.result;
                imagePreviewDiv.innerHTML = <img src="${currentImageBase64}" class="photo-preview" style="max-width:100%; max-height:150px; border-radius:12px;">;
            };
            reader.readAsDataURL(file);
        } else if (file) {
            alert("Можно загружать только фото");
        }
    });

    document.getElementById("submitBtn").onclick = () => {
        const text = textarea.value;
        if (!text.trim() && !currentImageBase64) {
            alert("Напиши текст или добавь фото");
            return;
        }
        addPost(text, currentImageBase64);
        form.style.display = "none";
        currentImageBase64 = null;
        imagePreviewDiv.innerHTML = "";
        textarea.value = "";
    };

    loadPosts();
</script>
</body>
</html>
